---
# Composite Action: Run Tests
# This action performs all validation steps: dependency installation,
# linting, formatting, unit tests, and configuration validation.

name: 'Run Tests'
description: 'Lint, format, unit tests with coverage, and validate'
runs:
  using: 'composite'
  steps:
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      shell: bash
    - name: Sync dependencies
      run: uv sync
      shell: bash
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Build React frontend
      run: |
        cd frontend
        npm install
        npm run build
      shell: bash
    - name: Run linting
      run: uv run ruff check .
      shell: bash
    - name: Run formatting check
      run: uv run black --check .
      shell: bash
    - name: Run unit tests with coverage
      run: PYTHONPATH=. uv run pytest tests/ --cov=vortai --cov-report=xml -W ignore::DeprecationWarning
      shell: bash
    - name: Run integration test
      run: uv run pytest tests/integration/test_smoke.py
      shell: bash
    - name: Validate vercel.json
      run: python -m json.tool deploy/vercel/vercel.json > /dev/null && echo "vercel.json is valid"
      shell: bash
